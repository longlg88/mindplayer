name: CI

# Functional gate for branches & PRs. `main` is gated by release.yml instead
# (so we don't run the same checks twice on a push to main).
on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: commit messages (Conventional Commits)
    # Only meaningful on PRs, where there's a base..head range to check.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: lint commit subjects
        run: |
          set -euo pipefail
          BASE="origin/${{ github.base_ref }}"
          git fetch --quiet origin "${{ github.base_ref }}"
          git log "$BASE..HEAD" --format=%s%x00 | python3 .github/check-commits.py RELEASE.md

  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: tests
        # Hermetic: no codex/claude/kiro CLIs are invoked — tests run against
        # fixtures and an isolated state file. MINDPLAYER_STATE keeps any stray
        # state write off the runner's HOME.
        #
        # --test-threads=1: many tests mutate the process-global MINDPLAYER_STATE
        # env var (guarded pairwise by a same-file mutex, but std::env::set_var
        # is documented as unsound to call concurrently with ANY other thread's
        # env::var read — including this job's own default MINDPLAYER_STATE,
        # which every test that never overrides it reads unguarded). Verified:
        # this exact race is what intermittently broke
        # `toggle_in_progress_marks_persists_and_unmarks` on this runner.
        run: cargo test --all -- --test-threads=1
        env:
          MINDPLAYER_STATE: ${{ runner.temp }}/mindplayer-ci-state.json

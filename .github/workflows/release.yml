name: Release

# On every push to main: run the full functional gate, and ONLY if it is green
# compute the next version (from RELEASE.md rules + commit messages), tag it, and
# publish a GitHub Release with prebuilt binaries. No release-worthy commits
# (only docs/chore/ci/test/style) → no release.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate:
    name: gate (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # --test-threads=1: many tests mutate the process-global MINDPLAYER_STATE
      # env var (guarded pairwise by a same-file mutex, but std::env::set_var
      # is documented as unsound to call concurrently with ANY other thread's
      # env::var read — including this job's own default MINDPLAYER_STATE,
      # which every test that never overrides it reads unguarded). Verified:
      # this exact race intermittently broke
      # `toggle_in_progress_marks_persists_and_unmarks` on this runner.
      - run: cargo test --all -- --test-threads=1
        env:
          MINDPLAYER_STATE: ${{ runner.temp }}/mindplayer-ci-state.json

  version:
    name: compute version
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.calc.outputs.bump }}
      version: ${{ steps.calc.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: calc
        name: bump from RELEASE.md + commits
        run: |
          set -euo pipefail
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -z "$LAST_TAG" ]; then
            CURRENT="$(grep -m1 '^version = ' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
            echo "no prior tag; baseline $CURRENT, scanning full history"
            git log --format=%B%x00 | python3 .github/next-version.py RELEASE.md "$CURRENT"
          else
            CURRENT="${LAST_TAG#v}"
            echo "last tag $LAST_TAG; scanning $LAST_TAG..HEAD"
            git log "$LAST_TAG..HEAD" --format=%B%x00 | python3 .github/next-version.py RELEASE.md "$CURRENT"
          fi

  release:
    name: tag + GitHub release
    needs: version
    if: needs.version.outputs.bump != 'none'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="v${{ needs.version.outputs.version }}"
          if git rev-parse "$V" >/dev/null 2>&1; then
            echo "tag $V already exists — skipping"; exit 0
          fi
          git tag "$V"
          git push origin "$V"
          gh release create "$V" --title "$V" --generate-notes

  build:
    name: build ${{ matrix.os }}
    needs: [version, release]
    if: needs.version.outputs.bump != 'none'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.version.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build TUI
        # The version is injected via MINDPLAYER_VERSION (read by build.rs) rather
        # than stamped into Cargo.toml — editing the tree would make build.rs's
        # `git describe --dirty` append "-dirty" to the released binary's version.
        env:
          MINDPLAYER_VERSION: ${{ needs.version.outputs.version }}
        run: cargo build --release -p mindplayer-tui
      - name: package
        id: pkg
        run: |
          set -euo pipefail
          V="${{ needs.version.outputs.version }}"
          OS="$(echo '${{ runner.os }}' | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          NAME="mindplayer-${V}-${OS}-${ARCH}.tar.gz"
          tar -C target/release -czf "$NAME" mindplayer
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.version.outputs.version }}" "${{ steps.pkg.outputs.name }}" --clobber

  build-app:
    name: build macOS app
    needs: [version, release]
    if: needs.version.outputs.bump != 'none'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.version.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build the Tauri app bundle
        run: |
          set -euo pipefail
          cd app
          npm install
          npm run build
      - name: package + upload the .app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ needs.version.outputs.version }}"
          ARCH="$(uname -m)"
          APP="$(find app/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)"
          [ -n "$APP" ] || { echo "no .app produced" >&2; exit 1; }
          NAME="mindplayer-app-${V}-macos-${ARCH}.tar.gz"
          tar -C "$(dirname "$APP")" -czf "$NAME" "$(basename "$APP")"
          gh release upload "v$V" "$NAME" --clobber
